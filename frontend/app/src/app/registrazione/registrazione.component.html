<div class="container">
  <div class="card">
    <h2>Registrazione</h2>

    <div class="alert alert-error" *ngIf="errore">
      {{ errore }}
    </div>

    <div class="alert alert-success" *ngIf="successo">
      {{ successo }}
    </div>

    <div class="form-group">
      <label>Nome *</label>
      <input
        type="text"
        [(ngModel)]="nome"
        name="nome"
        placeholder="Inserisci il tuo nome"
      />
    </div>

    <div class="form-group">
      <label>Cognome *</label>
      <input
        type="text"
        [(ngModel)]="cognome"
        name="cognome"
        placeholder="Inserisci il tuo cognome"
      />
    </div>

    <div class="form-group">
  <label>Email *</label>

  <input
    type="email"
    [(ngModel)]="email"
    name="email"
    placeholder="Inserisci la tua email"
    (focus)="mostraHintEmail = true"
    (blur)="mostraHintEmail = false"
  />

 <small class="hint-email" *ngIf="mostraHintEmail">
  Inserire una email istituzionale nel formato nome.cognome&#64;unive.it
</small>
</div>

    <div class="form-group">
      <label>Data di nascita *</label>
      <input
        type="date"
        [(ngModel)]="data_nascita"
        name="data_nascita"
      />
    </div>

    <div class="form-group">
      <label>Ruolo</label>
      <select [(ngModel)]="ruolo" name="ruolo">
        <option value="S">Studente</option>
        <option value="D">Docente</option>
        <option value="U">Amministrazione</option>
      </select>
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Inserisci la password"
      />
    </div>

    <div class="form-group">
      <label>Conferma Password *</label>
      <input
        type="password"
        [(ngModel)]="confermaPassword"
        name="confermaPassword"
        placeholder="Conferma la password"
      />
    </div>

    <button type="button" (click)="regi()">
  Registrazione
</button>

<p class="login-link">
  Hai già un account?
  <a routerLink="/login">Accedi</a>
</p>

<div class="footer-logo">
  <img src="cafoscari.png" alt="Ca' Foscari Venezia">
  <p>Università Ca' Foscari Venezia</p>
</div>

</div>
</div>
