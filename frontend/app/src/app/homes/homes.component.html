<div class="page">

  <header class="header">

    <div class="logo-area">
      <img src="cafoscari.png" alt="Ca Foscari">

      <div>
        <h1>Overseas</h1>
        <p>Portale Mobilità Internazionale</p>
      </div>
    </div>

    <button class="btn-modifica" (click)="apriModifica()">
      Modifica profilo
    </button>

  </header>

</div>


<div class="overlay" *ngIf="mostraModifica">

  <div class="side-panel">

    <button class="close-btn" (click)="chiudiModifica()">
      ×
    </button>

    <h2>Modifica dati</h2>
    <p class="subtitle">Aggiorna le informazioni del tuo profilo</p>

    <label>ID</label>
    <input
      type="number"
      [(ngModel)]="to.id"
      disabled>

    <label>Nome</label>
    <input
      type="text"
      [(ngModel)]="to.nome"
      [placeholder]="to.nome">

    <label>Cognome</label>
    <input
      type="text"
      [(ngModel)]="to.cognome"
      [placeholder]="to.cognome">

    <label>Email</label>
    <input
      type="email"
      [(ngModel)]="to.email"
      [placeholder]="to.email">

    <label>Ruolo</label>
    <input
      type="text"
      [(ngModel)]="to.ruolo"
      [placeholder]="to.ruolo">

    <label>Data di nascita</label>
    <input
      type="date"
      [(ngModel)]="to.data_nascita">

    <label>Password</label>
    <input
      type="password"
      [(ngModel)]="to.password"
      placeholder="Nuova password">

    <button class="save-btn" (click)="aggiornaUtente()">
      Salva modifiche
    </button>

    <div *ngIf="res.Pos == 1" class="success">
      {{ message}}
    </div>

    <div *ngIf="res.Neg == 1" class="error">
      {{ message }}
    </div>

  </div>

</div>
