<div class="page">

  <header class="header">

    <div class="logo-area">
      <img src="cafoscari.png" alt="Ca Foscari">

      <div>
        <h1>Overseas</h1>
        <p>Portale Mobilità Internazionale</p>
      </div>
    </div>

    <button class="btn-modifica" (click)="VisualizzaModifica()">
      Modifica profilo
    </button>

  </header>

  <button class="btn-crea-pratica" (click)="VisualizzaPratica()">
    📄 Crea Pratica
  </button>


  <!-- LISTA PRATICHE -->

  <div class="pratiche-container">

    <h2>Le tue pratiche</h2>

    <div *ngIf="pratiche_1.length === 0" class="empty-message">
      Non hai ancora pratiche.
    </div>

    <div class="pratica-card" *ngFor="let p of pratiche_1">

      <div class="pratica-header">

        <div>
          <h3>Pratica {{ p.id }}</h3>
          <p>Stato: <strong>{{ p.stato }}</strong></p>
        </div>

        <button
          class="btn-modifica-pratica"
          *ngIf="p.stato === 'ATT_APPROVAZIONE' || p.stato === 'MOBILITA_IN_CORSO'"
          (click)="selezionaPratica(p); attivaModificaPratica()">
          Modifica
        </button>

        <button
          class="btn-dettagli"
          *ngIf="p.stato !== 'ATT_APPROVAZIONE' && p.stato !== 'MOBILITA_IN_CORSO'"
          (click)="selezionaPratica(p)">
          Dettagli
        </button>

      </div>

      <div class="pratica-info">

        <label>ID Pratica</label>
        <input type="text" [ngModel]="p.id" readonly>

        <label>Email Studente</label>
        <input type="email" [ngModel]="p.studente_email" readonly>

        <label>Email Docente</label>
        <input type="email" [ngModel]="p.docente_email" readonly>

        <label>Istituto</label>
        <input type="text" [ngModel]="p.nome_istituto" readonly>

        <label>Data partenza</label>
        <input type="date" [ngModel]="p.data_inizio" readonly>

        <label>Data rientro</label>
        <input type="date" [ngModel]="p.data_fine" readonly>

        <label>Motivazione</label>
        <textarea [ngModel]="p.motivazione" readonly></textarea>

      </div>

    </div>

  </div>

</div>


<!-- DETTAGLIO / MODIFICA PRATICA -->

<div class="overlay" *ngIf="praticaSelezionata">

  <div class="side-panel pratica-panel">

    <button
      class="close-btn"
      (click)="praticaSelezionata = null; modificaPraticaAttiva = false">
      ×
    </button>

    <h2>Dettaglio pratica</h2>

    <p class="subtitle">
      Stato pratica: {{ praticaSelezionata.stato }}
    </p>

    <label>ID Pratica</label>
    <input
      type="text"
      [ngModel]="praticaSelezionata.id"
      readonly>

    <label>Email Studente</label>
    <input
      type="email"
      [ngModel]="praticaSelezionata.studente_email"
      readonly>

    <label>Email Docente</label>
    <input
      type="email"
      [(ngModel)]="emailDocente"
      [readonly]="!modificaPraticaAttiva || !puoModificareCampoNormale(praticaSelezionata)">

    <label>Istituto</label>
    <select
      [(ngModel)]="nomeIstituto"
      [disabled]="!modificaPraticaAttiva || !puoModificareCampoNormale(praticaSelezionata)">

      <option value="">Seleziona istituto</option>

      <option
        *ngFor="let istituto of istituti"
        [value]="istituto.nome">
        {{ istituto.nome }}
      </option>

    </select>

    <label>Data partenza</label>
    <input
      type="date"
      [(ngModel)]="dataPartenza"
      [readonly]="!modificaPraticaAttiva || !puoModificareCampoNormale(praticaSelezionata)">

    <label>Data rientro</label>
    <input
      type="date"
      [(ngModel)]="dataRientroModifica"
      [readonly]="!modificaPraticaAttiva || !puoModificareDataRientro(praticaSelezionata)">

    <label>Motivazione</label>
    <textarea
      [(ngModel)]="motivazioneModifica"
      readonly>
    </textarea>

    <h3 class="section-title">
      Esami della pratica
    </h3>

    <div
      class="esame-row"
      *ngFor="let esame of esamiPraticaModifica; let i = index">

      <select
        [(ngModel)]="esame.esame_locale_nome"
        [disabled]="!modificaPraticaAttiva || !puoModificareEsami(praticaSelezionata)">

        <option value="">Seleziona esame interno</option>

        <option
          *ngFor="let e of esami"
          [value]="e.nome">
          {{ e.nome }} ({{ e.crediti }} CFU)
        </option>

      </select>

      <select
        [(ngModel)]="esame.esame_estero_nome"
        [disabled]="!modificaPraticaAttiva || !puoModificareEsami(praticaSelezionata)">

        <option value="">Seleziona esame estero</option>

        <option
          *ngFor="let e of esami"
          [value]="e.nome_esame_estero"
          [disabled]="!e.nome_esame_estero">
          {{ e.nome_esame_estero }}
        </option>

      </select>

      <button
        type="button"
        class="trash-btn"
        *ngIf="modificaPraticaAttiva && puoModificareEsami(praticaSelezionata)"
        (click)="rimuoviEsameModifica(i)">
        🗑
      </button>

    </div>

    <button
      type="button"
      class="add-btn"
      *ngIf="modificaPraticaAttiva && puoModificareEsami(praticaSelezionata)"
      (click)="aggiungiEsameModifica()">
      + Aggiungi esame
    </button>

    <div class="azioni-pratica">

      <button
        class="save-btn"
        *ngIf="modificaPraticaAttiva"
        (click)="salvaModificaPratica()">
        Salva modifiche
      </button>

      <button
        class="cancel-btn"
        *ngIf="modificaPraticaAttiva"
        (click)="annullaModificaPratica()">
        Annulla
      </button>

    </div>

  </div>

</div>
