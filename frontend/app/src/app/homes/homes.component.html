
<div class="page">

  <header class="header">

    <div class="logo-area">
      <img src="cafoscari.png" alt="Ca Foscari">

      <div>
        <h1>Overseas</h1>
        <p>Portale Mobilità Internazionale</p>
      </div>
    </div>

    <button class="btn-modifica" (click)="VisualizzaModifica()">
      Modifica profilo
    </button>

  </header>

  <button class="btn-crea-pratica" (click)="VisualizzaPratica()">
    📄 Crea Pratica
  </button>

</div>


<!-- MODIFICA PROFILO -->

<div class="overlay" *ngIf="mostraModifica">

  <div class="side-panel">

    <button class="close-btn" (click)="VisualizzaModifica()">
      ×
    </button>

    <h2>Modifica dati</h2>
    <p class="subtitle">Aggiorna le informazioni del tuo profilo</p>

    <label>ID</label>
    <input type="number" [(ngModel)]="to.id" disabled>

    <label>Nome</label>
    <input type="text" [(ngModel)]="to.nome" [placeholder]="to.nome">

    <label>Cognome</label>
    <input type="text" [(ngModel)]="to.cognome" [placeholder]="to.cognome">

    <label>Email</label>
    <input type="email" [(ngModel)]="to.email" [placeholder]="to.email">

    <label>Ruolo</label>
    <input type="text" [(ngModel)]="to.ruolo" [placeholder]="to.ruolo">

    <label>Data di nascita</label>
    <input type="date" [(ngModel)]="to.data_nascita">

    <label>Password</label>
    <input
      type="password"
      [(ngModel)]="to.password"
      placeholder="Nuova password">

    <button class="save-btn" (click)="aggiornaUtente()">
      Salva modifiche
    </button>

    <div *ngIf="res.Pos == 1" class="success">
      {{ message }}
    </div>

    <div *ngIf="res.Neg == 1" class="error">
      {{ message }}
    </div>

  </div>

</div>


<!-- CREAZIONE PRATICA -->

<div class="overlay" *ngIf="mostraPratica">

  <div class="side-panel pratica-panel">

    <button class="close-btn" (click)="chiudiPratica()">
      ×
    </button>

    <h2>Nuova Pratica</h2>
    <p class="subtitle">Inserisci dati, esami e Learning Agreement</p>

    <label>ID Pratica</label>
    <input
      type="text"
      [(ngModel)]="idPratica"
      readonly>

    <label>Email Studente</label>
    <input
      type="email"
      [(ngModel)]="emailStudente"
      readonly>

    <label>Email Docente</label>
    <input
      type="email"
      [(ngModel)]="emailDocente"
      placeholder="Email docente">

    <label>Istituto estero</label>

    <select [(ngModel)]="nomeIstituto">

      <option value="">
        Seleziona istituto
      </option>

      <option
        *ngFor="let istituto of istituti"
        [value]="istituto.nome">

        {{ istituto.nome }}

      </option>

    </select>

    <label>Data partenza</label>

    <input
      type="date"
      [(ngModel)]="dataPartenza">

    <label>Data rientro</label>

    <input
      type="date"
      [(ngModel)]="dataRientro">

    <label>Semestre</label>

    <select [(ngModel)]="semestre">

      <option value="">
        Seleziona semestre
      </option>

      <option value="1">
        Primo semestre
      </option>

      <option value="2">
        Secondo semestre
      </option>

      <option value="A">
        Annuale
      </option>

    </select>

    <h3 class="section-title">
      Esami della pratica
    </h3>

    <div
      class="esame-row"
      *ngFor="let esame of esamiPratica; let i = index">

      <select [(ngModel)]="esame.esame_locale_nome">

        <option value="">
          Seleziona esame interno
        </option>

        <option
          *ngFor="let e of esami"
          [value]="e.nome">

          {{ e.nome }} ({{ e.crediti }} CFU)

        </option>

      </select>

      <select [(ngModel)]="esame.esame_estero_id">

        <option value="">
          Seleziona esame estero
        </option>

        <option
          *ngFor="let e of esami"
          [value]="e.nome_esame_estero"
          [disabled]="!e.nome_esame_estero">

          {{ e.nome_esame_estero }}

        </option>

      </select>

      <button
        type="button"
        class="trash-btn"
        (click)="rimuoviEsamePratica(i)">
        🗑
      </button>

    </div>

    <button
      type="button"
      class="add-btn"
      (click)="aggiungiRigaEsame()">
      + Aggiungi esame
    </button>

    <label>Carica Learning Agreement</label>

    <input
      type="file"
      (change)="selezionaFile($event)">

    <button
      class="save-btn"
      (click)="creaPratica()">
      Invia Pratica
    </button>

  </div>

</div>
